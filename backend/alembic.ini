[alembic]
script_location = alembic

[loggers]
keys = root,sqlalchemy,alembic
level = INFO
handlers =
qualname = %(name)s

[formatters]
keys = generic
format = %(levelname)-5.5s [%(name)s] %(message)s

[handlers]
keys = console
class = StreamHandler
args = (sys.stderr,)

[handlers.console]
level = NOTSET
formatter = generic

[logger_root]
level = INFO
handlers = console
qualname = root

[logger_sqlalchemy]
level = INFO
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

