name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clinedops
          POSTGRES_USER: clinedops
          POSTGRES_PASSWORD: clinedops_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U clinedops -d clinedops"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Alembic migrate
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://clinedops:clinedops_password@localhost:5432/clinedops
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          FRONTEND_ORIGIN: http://localhost:3000
          API_PREFIX: /api/v1
          JWT_ISSUER: clinedops
          JWT_AUDIENCE: clinedops
          ACCESS_TOKEN_TTL_MINUTES: "15"
          REFRESH_TOKEN_TTL_DAYS: "7"
          JWT_PRIVATE_KEY: ""
          JWT_PUBLIC_KEY: ""
        run: |
          alembic upgrade head

      - name: Backend tests + lint
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://clinedops:clinedops_password@localhost:5432/clinedops
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          FRONTEND_ORIGIN: http://localhost:3000
          API_PREFIX: /api/v1
          JWT_ISSUER: clinedops
          JWT_AUDIENCE: clinedops
          ACCESS_TOKEN_TTL_MINUTES: "15"
          REFRESH_TOKEN_TTL_DAYS: "7"
          JWT_PRIVATE_KEY: ""
          JWT_PUBLIC_KEY: ""
        run: |
          ruff check .
          mypy app --config-file mypy.ini
          pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend
        working-directory: frontend
        run: npm install

      - name: Frontend lint/typecheck/tests
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1
        run: |
          npm run lint
          npm run typecheck
          npm test -- --run

