x-backend-image-build: &backend_image_build
  context: .
  dockerfile: backend/Dockerfile
  args:
    # Relative to repo root (e.g. RAG or mykb). Copied into the image as /RAG at build time.
    RAG_DOCS_BUILD_PATH: ${RAG_DOCS_BUILD_PATH:-RAG}

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: clinedops
      POSTGRES_USER: clinedops
      POSTGRES_PASSWORD: clinedops_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      <<: *backend_image_build
    # Loads GROQ_API_KEY, GROQ_MODEL, etc. Values below override .env for Docker-specific URLs.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://clinedops:clinedops_password@db:5432/clinedops
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Same path + volume as celery so generated report files are visible to the API.
      REPORTS_STORAGE_DIR: /data/reports
      FRONTEND_ORIGIN: http://localhost:3000
      API_PREFIX: /api/v1
      JWT_ISSUER: clinedops
      JWT_AUDIENCE: clinedops
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "7"
      # If these keys are not provided, the container generates ephemeral dev keys at startup.
      JWT_PRIVATE_KEY: ""
      JWT_PUBLIC_KEY: ""
      # After migrations, seed DEMO.md personas once (superadmin@nuhs.edu.sg absent). Set to 0 to skip.
      AUTO_SEED_DEMO: "1"
      RAG_INDEX_PATH: /rag_data
      RAG_DOCS_PATH: /RAG
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - rag_data:/rag_data
      - reports_data:/data/reports

  celery:
    build:
      <<: *backend_image_build
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://clinedops:clinedops_password@db:5432/clinedops
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REPORTS_STORAGE_DIR: /data/reports
      FRONTEND_ORIGIN: http://localhost:3000
      API_PREFIX: /api/v1
      JWT_ISSUER: clinedops
      JWT_AUDIENCE: clinedops
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "7"
      JWT_PRIVATE_KEY: ""
      JWT_PUBLIC_KEY: ""
    depends_on:
      - db
      - redis
    volumes:
      - reports_data:/data/reports

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
  reports_data:
  rag_data:

